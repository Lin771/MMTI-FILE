    function calculateMatch(userAnswers, pattern) {
        let score = 0;
        for (let i = 0; i < 12; i++) {
            if (userAnswers[i] === pattern[i]) score++;
        }
        return score;
    }

    function getBestMatch() {
        let best = null;
        let maxScore = -1;
        for (let animal of ANIMALS) {
            let score = calculateMatch(answers, animal.pattern);
            if (score > maxScore) {
                maxScore = score;
                best = animal;
            }
        }
        return best;
    }

        `;
        mainDiv.innerHTML = html;

        const optDivs = document.querySelectorAll('.option-btn');
        optDivs.forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.getAttribute('data-val');
                answers[currentIndex] = val;
                optDivs.forEach(b => b.style.background = "#f4fbfd");
                btn.style.background = "#c2e6ed";
                btn.style.borderColor = "#028c7c";
            });
        });
        if (answers[currentIndex]) {
            const selectedVal = answers[currentIndex];
            optDivs.forEach(btn => {
                if (btn.getAttribute('data-val') === selectedVal) {
                    btn.style.background = "#c2e6ed";
                    btn.style.borderColor = "#028c7c";
                }
            });
        }

        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuiz();
            }
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (!answers[currentIndex]) {
                alert(langData[currentLang].quiz.alertMsg);
                return;
            }
            if (currentIndex === 11) {
                const best = getBestMatch();
                bestMatchAnimal = best;
                currentPage = 'result';
                renderResult();
            } else {
                currentIndex++;
                renderQuiz();
            }
        });
    }

    function renderResult() {
        const animal = bestMatchAnimal;
        const species = SPECIES_DATA[animal.key];
        const rLang = langData[currentLang].result;
        const img1Path = `images1/${animal.key}.jpg`;
        const img2Path = `images2/${animal.key}.jpg`;
        const creditUrl = IMAGE_CREDITS[animal.key] || "#";
        const personality = (currentLang === 'zh') ? animal.personalityZh : animal.personalityEn;
        const animalName = (currentLang === 'zh') ? animal.nameZh : animal.nameEn;

        // 物种介绍部分（中文始终显示中文，英文模式也显示中文以保证内容准确，或者显示英文翻译？这里为了完整性，英文模式也显示中文）
        // 用户要求文本与提供的一致，所以物种介绍部分不分语言，统一显示中文。但为了双语体验，也可增加简单英文，这里选择统一中文。
        const speciesHtml = `
            <div class="species-section">
                <div class="section-title">${rLang.speciesTitle}</div>
                <div class="species-detail"><span class="detail-label">${rLang.latin}</span> <span class="scientific-name">${species.latin}</span></div>
                <div class="species-detail"><span class="detail-label">${rLang.taxonomy}</span> ${species.taxonomy}</div>
                <div class="species-detail"><span class="detail-label">${rLang.familyExt}</span> ${species.familyExt}</div>
                <div class="species-detail"><span class="detail-label">${rLang.intro}</span> ${species.intro}</div>
                <div class="species-detail"><span class="detail-label">${rLang.iucn}</span> ${species.iucnStatus} &nbsp; <a href="${species.iucnUrl}" target="_blank" class="iucn-link">🔗 ${rLang.linkText || '查看详情'}</a></div>
                <div class="species-detail"><span class="detail-label">${rLang.distribution}</span> ${species.distribution}</div>
            </div>
        `;
        // 补充链接文本
        const linkText = currentLang === 'zh' ? '查看详情' : 'Details';

        const html = `
            <div class="result-card">
                <div style="font-size: 2rem; text-align:center;">🐙✨ ${rLang.title} ✨🐙</div>
                <div class="animal-name">${animalName}</div>
                <div class="image-row">
                    <div class="image-container">
                        <img src="${img1Path}" alt="${animalName} - 1" class="result-img" onerror="this.src='https://placehold.co/200x200?text=Image+Not+Found'">
                    </div>
                    <div class="image-container">
                        <img src="${img2Path}" alt="${animalName} - 2" class="result-img" onerror="this.src='https://placehold.co/200x200?text=Image+Not+Found'">
                        <div class="img-credit">${rLang.creditPrefix} <a href="${creditUrl}" target="_blank">${creditUrl.replace(/^https?:\/\/(www\.)?/, '').split('/')[0]}</a></div>
                    </div>
                </div>
                <div class="personality-block">
                    <div class="desc-title">${rLang.personalityTitle}</div>
                    <div class="personality-text">${personality}</div>
                </div>
                ${speciesHtml.replace('🔗 查看详情', `🔗 ${linkText}`).replace('🔗 Details', `🔗 ${linkText}`)}
                <button class="btn btn-primary restart-btn" id="restartBtn">${rLang.restart}</button>
            </div>
            <footer>${langData[currentLang].footer}</footer>
        `;
        mainDiv.innerHTML = html;
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            currentPage = 'welcome';
            renderWelcome();
        });
    }

    function refreshPage() {
        updateHeader();
        if (currentPage === 'welcome') {
            renderWelcome();
        } else if (currentPage === 'quiz') {
            renderQuiz();
        } else if (currentPage === 'result' && bestMatchAnimal) {
            renderResult();
        } else {
            currentPage = 'welcome';
            renderWelcome();
        }
    }

    langToggle.addEventListener('click', () => {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        refreshPage();
    });

    updateHeader();
    renderWelcome();
</script>
</body>
</html>
