                introZh: "蓝鲸是世界上已知体积和体重最大的动物，长可达33米，重达181吨。这个长度大约相当于11层普通住宅楼的高度，体重则堪比10辆满载的重型卡车，是当之无愧的海洋巨无霸。与大多数须鲸不同，蓝鲸全年都在摄食，主食是磷虾等甲壳动物，偶尔捕食小鱼群。它们通常独来独往或成对活动，有时也会形成小的群体。每头蓝鲸身上独一无二的斑点和部分个体的尾叶腹面的细条纹，如同人类指纹一样，可用于个体识别。此外，雄性蓝鲸能发出深沉、悠远的“鲸歌”，在深海中传播。然而，这个宏伟的物种却因历史上的大规模捕杀而濒临灭绝。尽管唯一已知的天敌是虎鲸，但真正的生存威胁却来自人类。",

            beluga: {

                introZh: "鲸如其名，白鲸的体色介于苍白色到纯白色之间。不过，它们并非生来就这么“白”。未成年个体的体色更深，它们会随着年龄增长，逐渐“褪”成标志性的白色。即使在成年后，体色也并非一成不变，在初夏的蜕皮期间，部分成年白鲸的体色会暂时转为浅灰色。此外，白鲸以其丰富的发声能力闻名，素有“海洋金丝雀”的美称。白鲸能发出的声音多种多样、变化多端，既包括常规的用于回声定位的咔哒声，也包括社交用的颤音、嘎嘎叫、钟声、尖锐的啪啪声（可能由拍击颚部所产生）、与近似推动生锈门板的声音。在行为上，白鲸也颇具特点。它们很少进行跃出水面等空中动作，但其颈椎未完全愈合，因此颈部异常灵活，头能够侧向转动，这在鲸目动物中非常罕见。",

                introZh: "一角鲸，又名独角鲸，生活在遥远的北极。它们每年有半年时间，都穿梭于密集的浮冰与漫长的极夜之中，却依然遵循着固定的路线进行洄游。雄性一角鲸拥有一根长达2-3米的螺旋状长牙，少数雌性也有。这根长牙并非武器，而是感知海水环境变化的工具，在同类社交中，它还用于炫耀地位、吸引配偶。社交时，一角鲸们经常在海面上打滚，雄性一角鲸们会在空中晃动长牙，或者将长牙放在其他个体的背上休息。目前，一角鲸赖以生存的海冰栖息地因气候变化而萎缩，其食物与天敌的分布也随之改变。因此，它被列为对气候变化最为敏感的三大海洋哺乳动物之一。",

            sperm_whale: {

            harbour_porpoise: {

            chinese_white_dolphin: {

                introZh: "中华白海豚素有“水上大熊猫”之称。它那身亮眼的粉红色彩与灵动优雅的身姿，让有幸在河口或近海邂逅的人们过目不忘。但其实中华白海豚的体色会随年龄发生变化，大致分为三个阶段：幼年阶段的体色呈暗灰色；亚成体阶段的体色逐渐变浅，呈现灰色与粉红色相杂；成年阶段的体色变为纯白色。这种粉红色其实是它表皮下血管透出的颜色，而它的真实体色其实是纯白色。更有趣的是，它嘴角天然上翘，仿佛永远带着温柔的微笑，“微笑天使”之名由此而来。这份美丽背后，是它独特的生存习性与脆弱的处境。它们偏爱河口咸淡水交汇的浅水区，以鱼类为食。但由于栖息环境特殊、繁殖率低，加之沿岸开发、水质污染等人类活动的持续威胁，它们的生存空间正不断被挤压。2008年，中华白海豚被列入《世界自然保护联盟濒危物种红色名录》，在我国更是被列为国家一级重点保护野生动物。",

            common_dolphin: {

                introZh: "真海豚的体色图案独特而醒目。其背部有一条显著的深灰色斑纹，犹如披肩；体侧点缀着淡黄、褐或赭色的斑块，腹部则为白色。在背鳍下方，体侧的灰色区域与腹部的白色区域交汇，形成清晰的色彩对比。真海豚是表演空中动作的健将，它经常进行各种高难度跳跃以及空翻等动作，喜爱伴船而行。真海豚是高度群居的物种，它们是高度社会化的物种，常与其他海豚或鲸类混群，群体规模从十余头到上万头不等。其超大型群体通常由多个稳定的、约20-30头个体组成的核心小群构成。",

                introZh: "西印度海牛身躯浑圆、呈流线型，背部宽阔，无背鳍。它们的体表通常为灰色，部分个体因附生藻类或藤壶而呈褐、红或白色。它们偏好生活在水草丰茂、水流平缓的海湾、泻湖或河口等近淡水水域。它们的习性从容温和。每天会花费6至8小时缓慢觅食，以各种水生植物为食，偶尔也会爬上浅滩。作息随性，无明显昼夜规律，睡眠时间则随水温变化，温暖时约睡2至4小时，寒冷时则可长达8小时。海牛通常以母子为核心结成小群，以声音保持联系。它们也会形成临时性的松散群体，共同分享食物、淡水或温暖水域，展现出平和、互助的社交习性。",

            walrus: {
                latin: "Odobenus rosmarus",
                taxonomyZh: "食肉目 > 鳍足亚目 > 海象科 > 海象属",
                taxonomyEn: "Carnivora > Pinnipedia > Odobenidae > Odobenus",
                introZh: "海象是北极地区的鳍脚类动物，身躯庞大而圆润，皮肤厚而多皱，皮下脂肪极厚以抵御严寒。它们最显著的特征是嘴旁的一对发达犬齿，雄性的长牙尤为突出。长牙既是挖掘海底贝类的工具，也是攀爬冰面的“冰镐”，更是其社会地位与争斗的关键。海象是高度社会性的动物，常成千上万只聚集在浮冰或海岸上休息，彼此紧靠以取暖。群体中有明确的等级秩序，长牙的大小、身体的强壮程度以及攻击性的强弱，直接决定了个体在群体中的统治地位。在繁殖季节，为了争夺配偶和领地，雄性海象之间会爆发激烈的争斗。它们会用长牙互相撞击、撬拨，并发出巨大的吼声来威慑对手，失败者往往伤痕累累。母海象则对幼崽保护欲极强，会勇敢地攻击威胁幼崽的北极熊等天敌。在陆地上，海象行动迟缓，主要依靠长牙和后肢配合在冰面挪动。但一旦回到海中，它们便依靠流线型的身体和强有力的鳍状肢行动自如。它们就这样在冰海与陆地之间，过着既紧密依存又充满竞争的两栖群居生活。",
                introEn: "The walrus is a large, rotund Arctic pinniped with thick, wrinkled skin and dense blubber. Its most prominent feature is a pair of elongated canine teeth—tusks—especially large in males. Tusks are used for digging clams, hauling out onto ice, and establishing social dominance. Walruses are highly social, hauling out in thousands on ice or beaches. Hierarchies are based on tusk size, body mass, and aggressiveness. During the breeding season, males fight fiercely with tusks and loud bellows. Mothers are fiercely protective of calves, even attacking polar bears. On land, walruses are clumsy, moving with tusks and hind flippers. In water, they are agile and graceful. They lead a densely social, competitive amphibious life.",

                iucnUrl: "https://www.iucnredlist.org/species/15106/272356023",
                distributionZh: "海象主要生活于北冰洋海域；由于海象可作短途旅行，所以在太平洋和大西洋都有其踪影。通常群居于大的浮冰或海岸附近。",
                distributionEn: "Arctic Ocean and adjacent seas of the Atlantic and Pacific. Usually haul out on pack ice or coastal beaches."

            sea_lion: {

            seal: {

                introZh: "海豹在外形上与海狮相似，最显著的区别是海豹没有外耳廓。斑海豹是分布于北半球温带至寒带海域的海豹。其最显著的外形特点是体表具有浅色背景上散布的深色不规则斑点，毛色随个体与季节在银灰至灰白间变化。每年它们会进行规律性洄游，并经历一次集中换毛。它们主要以鱼类和头足类为食，具有明显的社交属性，虽然在非繁殖期可独居，但在繁殖、育幼及换毛季节会形成大群，聚集在浮冰或海岸上。这使其栖息地高度依赖稳定的沿岸环境，包括安全的礁石与海岸，用于休息、换毛和育幼。然而，这种依赖性也使其生存易受人类活动影响。",

            sea_otter: {

                taxonomyEn: "Carnivora > Mustelidae > Enhydra",
                introZh: "海獭是食肉目中最适应海洋生活的物种之一，几乎一生都在水中活动，连生产与育幼也多在水中完成。它们一天可摄食相当于自身体重四分之一的食物，主要以海胆、贝类、蟹类等为食，是近海生态中的关键物种。其最令人称道的智力体现在取食过程中。当捕捉到海胆、蛤蜊等带壳猎物后，海獭会从海底挑选一块石头带回水面，随后仰面躺下，将石块置于胸前作为“砧板”，再用前爪抓握猎物反复敲击，直至硬壳碎裂。这套娴熟的工具使用行为，在动物界中极为突出。除了捕食，它们也常在水中仰浮休息，并花大量时间梳理皮毛，以保持其清洁与防水性。通过捕食海胆，海獭间接维护了海藻林的健康，在沿岸生态系统中扮演着不可替代的角色。",

                introZh: "北极熊是生活在北极冰原上的顶级捕食者，也是现存最大的陆地食肉动物。它们几乎终生独居，仅交配期或母熊抚育幼崽时才会短暂结伴。这种独居习性使其活动范围极广，常独自穿越广阔的浮冰区寻找猎物。为适应极端环境，北极熊演化出多项生存特征：极厚的皮下脂肪与浓密毛发可抵御严寒；雪白的毛色能与冰原融为一体，是绝佳的保护色。它们几乎完全依赖肉类获取能量，其约九成的热量来自捕食海豹。因此，北极熊的生存与海冰息息相关——浮冰不仅是其捕猎海豹的平台，也是母熊生育和抚育后代的育婴所。在北极这片严酷而脆弱的舞台上，独行的北极熊凭借极强的适应力，成为了冰原上最具代表性的生存大师。",

              personalityZh: "你是河口三角洲富有魅力的管理者与精神象征，优雅与权威的完美结合。你领导着一个结构稳定、运作高效的社群，并因智慧而备受爱戴。你对家园有着深厚的归属感与守护的使命感。你善于在传统与变革之间寻找平衡，在维护社群的稳定结构的同时，灵活地应对外部挑战。你的沟通充满魅力与威信，能有效地组织与动员。你的生活高效而充实，是责任与风度的体现，在带领族群繁荣的同时，也定义了何谓领袖力量。你是一位有威信、有方法、关心群体的杰出领导者。",
              personalityEn: "You are a charismatic steward and spiritual symbol of the estuary delta, a perfect blend of grace and authority. You lead a stable, efficient community, beloved for your wisdom. You possess a deep sense of belonging and a mission to protect your homeland. You skillfully balance tradition and change, maintaining social structure while flexibly responding to external challenges. Your communication is charming and authoritative, effectively organizing and mobilizing. Your life is efficient and fulfilling, a reflection of duty and poise. While guiding your pod to prosperity, you define what leadership means. A prestigious, methodical, and caring leader.",
              pattern: ["C","A","B","B","A","A","A","A","C","A","A","C"] },
            { key: "common_dolphin", nameZh: "真海豚", nameEn: "Common Dolphin",
              personalityZh: "你是大洋上永恒的自由精灵与冒险家。你热爱“速度与激情”，你热爱在庞大的、充满活力的团队中行动，享受群体共鸣与集体驰骋的快感。你追逐新鲜与未知，对世界抱有永不满足的好奇心。你的社交风格自由奔放，与同伴联结紧密但绝不受缚。你钟情于开阔温暖的大洋，但你也能顺应潮流，乐于迁徙，认为下一片海域更精彩。你的生活节奏随性而动感，你的处事哲学是活在当下，用敏捷的行动和开放的心态，拥抱生命馈赠的每一场冒险。",
              personalityEn: "You are an eternal free spirit and adventurer of the open ocean. You love 'fast and furious', thriving in large, dynamic groups and reveling in collective speed and resonance. You chase novelty and the unknown with insatiable curiosity. Your social style is free and exuberant—closely bonded but never constrained. You adore warm, open seas, yet you go with the flow, happily migrating because the next sea is always more exciting. Your rhythm is spontaneous and dynamic; your philosophy is to live in the moment, embracing every adventure with agility and an open heart.",
              pattern: ["B","B","B","C","A","C","B","B","A","A","B","B"] },
            { key: "manatee", nameZh: "海牛", nameEn: "Manatee",
              personalityZh: "你是浅海世界里的和平主义者和冥想家。你追求一种缓慢、简单、与世无争的存在状态。你永远慢悠悠地徜徉在温暖的热带浅海或河口，在独处或极简的社交中获得平静。你对外部世界几乎毫无欲求，总是沉浸自己内心的祥和与对当下的觉知之中。你定力惊人，宁愿向内调整适应环境，也绝不主动挑起纷争或精神家园。你的生活本身就是一首关于存在、接纳与和谐的散文诗。",
              personalityEn: "You are a pacifist and meditator of the shallow seas. You pursue a slow, simple, uncompetitive existence. You drift lazily through warm tropical shallows or estuaries, finding peace in solitude or minimal social contact. You have few worldly desires, immersed instead in inner tranquility and present-moment awareness. Your composure is remarkable; you would rather adapt inwardly than initiate conflict or disturb your spiritual home. Your life is a prose poem about being, acceptance, and harmony.",
              pattern: ["A","A","A","A","C","C","C","A","C","A","B","A"] },
            { key: "walrus", nameZh: "海象", nameEn: "Walrus",
              personalityZh: "你是冰缘海滩上务实而威严的秩序管理者，崇尚力量、等级与明确的规则。你在庞大而结构森严的社群中感到自在，并致力于维护其中的秩序。你偏好直接的沟通方式，善于利用现有资源，用最有效的方式达成目标。面对环境变化，你是个务实的机会主义者，会改变策略以求生存。平时你尊重传统与层级，生活严谨而规律。总而言之，你是一个坚定的现状维护者，坚定执行着你所认定的公正与效率。",
              personalityEn: "You are a pragmatic, imposing enforcer of order on the icy beach, respecting strength, hierarchy, and clear rules. You feel at ease in large, structured communities and work to maintain their order. You prefer direct communication and are adept at using available resources to achieve goals efficiently. When environments change, you are a pragmatic opportunist, altering strategies to survive. In daily life, you respect tradition and rank, living a disciplined, regular life. In short, you are a steadfast defender of the status quo, firmly executing your version of justice and efficiency.",
              pattern: ["B","C","C","A","B","B","C","A","B","C","C","A"] },
            { key: "sea_lion", nameZh: "海狮", nameEn: "Sea Lion",
              personalityZh: "你是码头与岸线上活力四射的即兴表演者。你热衷于在人群中成为焦点，并且用你的热情、幽默感染每一个人。你渴望互动与赞赏，对世界充满玩乐般的好奇。等级分明的群体构成了你社会性的一部分。你适应力极强，善于利用新机会，能轻松融入任何场合以及应对变化。你的生活是一场永不冷场的派对，混合了必要的责任与大量的即兴的快乐。你是天生的气氛制造者，沉浸而享受着生活中的每个时刻，尽最大的努力让自己尽情闪耀。",
              personalityEn: "You are an energetic, impromptu performer on docks and shorelines. You love being the center of attention, infecting everyone with your warmth and humor. You crave interaction and appreciation, and view the world with playful curiosity. Hierarchical groups form part of your social fabric. You are highly adaptable, seizing new opportunities and blending effortlessly into any scene or change. Your life is a non-stop party, mixing necessary duties with abundant spontaneous joy. A natural atmosphere-maker, you immerse yourself in each moment and strive to shine your brightest.",
              pattern: ["B","A","C","B","A","B","B","A","B","B","A","C"] },
            { key: "seal", nameZh: "海豹", nameEn: "Seal",
              personalityZh: "你是冰与水之间独立自足的手艺人，善于在宁静与实效中找到平衡。你享受自给自足的孤独，偶尔与少数同类保持舒适的联系。你注重实际，是解决问题和掌握实用技能的专家。你对环境变化敏感而务实，能迅速调整策略以适应新情况。你的社交需求很低，更倾向于用行动表达。你的生活有一套自己熟悉的、高效的节奏，在专注的独处与必要的应变中游刃有余。你不是社交家，而是专注自身技艺与生存的孤独工匠。",
              personalityEn: "You are a self-sufficient artisan between ice and water, adept at balancing tranquility with practicality. You enjoy self-reliant solitude, occasionally maintaining comfortable contact with a few peers. You are pragmatic, an expert at problem-solving and mastering practical skills. Sensitive and realistic about environmental changes, you quickly adjust strategies. Your social needs are low; you prefer expressing through actions. Your life follows a familiar, efficient rhythm, navigating between focused solitude and necessary adaptation with ease. You are not a socialite, but a solitary craftsman dedicated to your own skills and survival.",
              pattern: ["A","C","B","B","B","C","C","A","B","C","B","A"] },
            { key: "sea_otter", nameZh: "海獭", nameEn: "Sea Otter",
              personalityZh: "你是海藻林中的温柔灵巧的创新者与生活美学家，擅长将实用智慧与情感体验巧妙结合。你在平等、合作的小团体中感到舒适，你们沟通方式相对简单但有效，并且你也擅长用创造性的方式（比如使用工具）解决问题，让生活更美好。你充满好奇心，乐于探索和尝试新鲜事物。你的生活节奏轻松，善于在日常中发现“小确幸”，并将劳动转化为一种游戏或仪式。你非好斗之人，更倾向于用智慧和灵动来规避风险。你是一位用温情与巧思装点生活的梦想家。",
              personalityEn: "You are a gentle, dexterous innovator and life aesthete of the kelp forest, skillfully blending practical wisdom with emotional experience. You feel comfortable in equal, cooperative small groups; communication is simple yet effective. You excel at creative problem-solving (like using tools) to improve life. Curious and eager to explore novelty. Your pace is relaxed; you find 'small joys' in daily life and turn labor into play or ritual. Not a fighter, you prefer using wit and agility to avoid risk. A dreamer who adorns life with warmth and ingenuity.",
              pattern: ["C","A","C","A","A","A","B","A","B","B","B","B"] },
            { key: "polar_bear", nameZh: "北极熊", nameEn: "Polar Bear",
              personalityZh: "你是浮冰之上的生存战略家与适应大师。你独来独往，是孤独的王者。你渴望并且享受绝对的自主，那是你保持敏锐和力量的源泉。你是一个高度专注、内在驱动的问题解决者，善于分析环境并制定出高效的个性化策略。你对外界漠不关心，只聚焦于自己的目标。你极度灵活，是顶级的机会主义者和创新者，能为了生存不断重塑规则。你的沟通精简至极，因为行动本身已是雄辩。你是一位冷静、自制、在严酷世界中仅凭智与力就能定义规则的生存大师。",
              personalityEn: "You are a survival strategist and master of adaptation on the sea ice. Solitary, a king of solitude. You crave and relish absolute autonomy—the source of your sharpness and strength. A highly focused, internally driven problem-solver, you analyze environments and devise efficient, personalized strategies. Indifferent to the outside world, you focus solely on your goals. Extremely flexible, a supreme opportunist and innovator, you continually reinvent rules to survive. Your communication is minimal because action speaks louder than words. A calm, self-possessed survival master who defines the rules in a harsh world through wit and power alone.",
              pattern: ["A","C","B","A","C","C","C","A","B","C","C","B"] }
        ];

        const IMAGE_CREDITS = { 
            blue_whale: "https://en.wikipedia.org/wiki/Blue_whale", orca: "https://en.wikipedia.org/wiki/Orca", beluga: "https://zh.wikipedia.org/wiki/%E7%99%BD%E9%B2%B8", narwhal: "https://en.wikipedia.org/wiki/Narwhal", sperm_whale: "https://en.wikipedia.org/wiki/Sperm_whale", harbour_porpoise: "https://en.wikipedia.org/wiki/Harbour_porpoise", finless_porpoise: "https://en.wikipedia.org/wiki/Yangtze_finless_porpoise", bottlenose_dolphin: "https://en.wikipedia.org/wiki/Bottlenose_dolphin", chinese_white_dolphin: "https://www.fisheries.noaa.gov/species/taiwanese-humpback-dolphin", common_dolphin: "https://en.wikipedia.org/wiki/Common_dolphin", manatee: "https://en.wikipedia.org/wiki/Manatee", walrus: "https://zh.wikipedia.org/wiki/%E6%B5%B7%E8%B1%A1", sea_lion: "https://zh.wikipedia.org/wiki/%E6%B5%B7%E7%8D%85", seal: "https://en.wikipedia.org/wiki/Earless_seal", sea_otter: "https://en.wikipedia.org/wiki/Sea_otter", polar_bear: "https://zh.wikipedia.org/zh-cn/%E5%8C%97%E6%A5%B5%E7%86%8A"
        };

        // ---------- 全局状态 ----------
        let currentLang = 'zh', currentPage = 'welcome', currentIndex = 0;
        let answers = new Array(12).fill(null), bestMatchAnimal = null;
        const mainDiv = document.getElementById('mainContent'), langToggle = document.getElementById('langToggle');
        const badgeSpan = document.getElementById('badgeText'), subTextSpan = document.getElementById('subText'), teamSpan = document.getElementById('teamText');

        function updateHeader() {
            badgeSpan.innerText = langData[currentLang].badge;
            subTextSpan.innerText = langData[currentLang].sub;
            teamSpan.innerText = langData[currentLang].team;
            langToggle.innerText = currentLang === 'zh' ? '🌐 English' : '🌐 中文';
        }

        function calculateMatch(u, p) { return u.reduce((s, a, i) => a === p[i] ? s+1 : s, 0); }
        function getBestMatch() { let b = null, m = -1; ANIMALS.forEach(a => { let s = calculateMatch(answers, a.pattern); if (s > m) { m = s; b = a; } }); return b; }

        function renderWelcome() {
            const w = langData[currentLang].welcome;
            mainDiv.innerHTML = `<div class="welcome-content"><h2>${w.title}</h2><div class="welcome-text">${w.intro}</div><button class="btn-start" id="startBtn">${w.startBtn}</button></div><footer>${langData[currentLang].footer}</footer>`;
            document.getElementById('startBtn').addEventListener('click', () => { currentPage = 'quiz'; currentIndex = 0; answers.fill(null); renderQuiz(); });
        }

        function renderQuiz() {
            const qData = QUESTIONS[currentLang][currentIndex], pct = (currentIndex / 12) * 100, ql = langData[currentLang].quiz;
            const nextText = currentIndex === 11 ? ql.resultBtn : ql.nextBtn;
            let optsHtml = ''; qData.options.forEach(opt => optsHtml += `<div class="option-btn" data-val="${opt.val}"><span class="option-prefix">${opt.val}</span><span>${opt.label}</span></div>`);
            mainDiv.innerHTML = `<div class="progress-area"><div class="progress-text"><span>🐚 ${currentIndex+1} / 12</span><span>${Math.round(pct)}%</span></div><div class="progress-bar-bg"><div class="progress-fill" style="width:${pct}%;"></div></div></div><div class="question-box"><div class="question-text">${qData.text}</div><div class="options-list" id="optionsList">${optsHtml}</div><div class="nav-buttons"><button class="btn btn-secondary" id="prevBtn" ${currentIndex===0?'disabled style="opacity:0.4"':''}>${ql.prevBtn}</button><button class="btn btn-primary" id="nextBtn">${nextText}</button></div></div><footer>${langData[currentLang].footer}</footer>`;
            const optDivs = document.querySelectorAll('.option-btn');
            optDivs.forEach(btn => btn.addEventListener('click', () => { answers[currentIndex] = btn.dataset.val; optDivs.forEach(b => { b.style.background = "#f4fbfd"; b.style.borderColor = "#cbe1e6"; }); btn.style.background = "#c2e6ed"; btn.style.borderColor = "#028c7c"; }));
            if (answers[currentIndex]) optDivs.forEach(btn => { if(btn.dataset.val === answers[currentIndex]) { btn.style.background = "#c2e6ed"; btn.style.borderColor = "#028c7c"; } });
            document.getElementById('prevBtn')?.addEventListener('click', () => { if(currentIndex>0){ currentIndex--; renderQuiz(); } });
            document.getElementById('nextBtn')?.addEventListener('click', () => {
                if(!answers[currentIndex]) return alert(langData[currentLang].quiz.alertMsg);
                if(currentIndex === 11) { bestMatchAnimal = getBestMatch(); currentPage = 'result'; renderResult(); }
                else { currentIndex++; renderQuiz(); }
            });
        }

        function renderResult() {
            const animal = bestMatchAnimal, species = SPECIES_DATA[animal.key], rl = langData[currentLang].result, isZh = currentLang === 'zh';
            const personality = isZh ? animal.personalityZh : animal.personalityEn, animalName = isZh ? animal.nameZh : animal.nameEn;
            const taxonomy = isZh ? species.taxonomyZh : species.taxonomyEn;
            const intro = isZh ? species.introZh : species.introEn, distribution = isZh ? species.distributionZh : species.distributionEn;
            const creditUrl = IMAGE_CREDITS[animal.key] || "#", linkText = isZh ? '查看详情' : 'Details';
            // 注意：此处移除了 familyExt 对应的 HTML 结构
            mainDiv.innerHTML = `<div class="result-card"><div class="animal-name">${animalName}</div><div class="image-row"><div class="image-container"><img src="images1/${animal.key}.jpg" alt="${animalName}" class="result-img" onerror="this.src='https://placehold.co/200x200?text=Image'"><div class="img-credit">${rl.artistNote}</div></div><div class="image-container"><img src="images2/${animal.key}.jpg" alt="${animalName}" class="result-img" onerror="this.src='https://placehold.co/200x200?text=Image'"><div class="img-credit">${rl.creditPrefix} <a href="${creditUrl}" target="_blank">${creditUrl.replace(/^https?:\/\/(www\.)?/,'').split('/')[0]}</a></div></div></div><div class="personality-block"><div class="desc-title">${rl.personalityTitle}</div><div class="personality-text">${personality}</div></div><div class="species-section"><div class="section-title">${rl.speciesTitle}</div><div class="species-detail"><span class="detail-label">${rl.latin}</span> <span class="scientific-name">${species.latin}</span></div><div class="species-detail"><span class="detail-label">${rl.taxonomy}</span> ${taxonomy}</div><div class="species-detail"><span class="detail-label">${rl.intro}</span> ${intro}</div><div class="species-detail"><span class="detail-label">${rl.iucn}</span> ${species.iucnStatus} &nbsp; <a href="${species.iucnUrl}" target="_blank" class="iucn-link">🔗 ${linkText}</a></div><div class="species-detail"><span class="detail-label">${rl.distribution}</span> ${distribution}</div></div><button class="btn btn-primary restart-btn" id="restartBtn">${rl.restart}</button></div><footer>${langData[currentLang].footer}</footer>`;
            document.getElementById('restartBtn').addEventListener('click', () => { currentPage='welcome'; renderWelcome(); });
        }

        function refresh() { updateHeader(); if (currentPage === 'welcome') renderWelcome(); else if (currentPage === 'quiz') renderQuiz(); else if (currentPage === 'result' && bestMatchAnimal) renderResult(); else { currentPage='welcome'; renderWelcome(); } }
        langToggle.addEventListener('click', () => { currentLang = currentLang === 'zh' ? 'en' : 'zh'; refresh(); });
        updateHeader(); renderWelcome();
    })();
</script>
</body>
</html>
