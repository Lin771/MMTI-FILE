          personalityZh: "海湾的热心协调员，形成紧密群体，互助育儿，情商高，乐于帮助同伴。",
          personalityEn: "Warm-hearted coordinator of bays, forms tight-knit groups, cooperative child-rearing, high EQ, enjoys helping companions.",
          pattern: ["C","A","B","B","A","A","A","B","B","B","A","C"] },
        { key: "chinese_white_dolphin", nameZh: "中华白海豚", nameEn: "Chinese White Dolphin",
          personalityZh: "粉红河口的女神领袖，群体稳定，优雅有魅力，擅长引导族群。",
          personalityEn: "Pink estuary goddess leader, stable groups, elegant and charismatic, skilled at guiding the pod.",
          pattern: ["C","A","B","B","A","A","A","A","C","A","A","C"] },
        { key: "common_dolphin", nameZh: "真海豚", nameEn: "Common Dolphin",
          personalityZh: "船首的冲浪冒险家，大群高速游动，喜欢乘浪，行动派，享受速度。",
          personalityEn: "Bow-riding adventurer, large groups moving fast, loves surfing, action-oriented, enjoys speed.",
          pattern: ["B","B","B","C","A","C","B","B","A","A","B","B"] },
        { key: "manatee", nameZh: "海牛", nameEn: "Manatee",
          personalityZh: "热带浅海的素食诗人，行动缓慢，温顺无害，悠然自得，活在当下。",
          personalityEn: "Vegetarian poet of tropical shallows, slow-moving, gentle and harmless, carefree, living in the moment.",
          pattern: ["A","A","A","A","C","C","C","A","C","A","B","A"] },
        { key: "walrus", nameZh: "海象", nameEn: "Walrus",
          personalityZh: "海滩的秩序执法官，等级分明，用长牙争夺地位，务实高效。",
          personalityEn: "Beach law enforcer, hierarchical, uses tusks to compete for status, pragmatic and efficient.",
          pattern: ["B","C","C","A","B","B","C","A","B","C","C","A"] },
        { key: "sea_lion", nameZh: "海狮", nameEn: "Sea Lion",
          personalityZh: "码头的即兴喜剧演员，喧闹灵活，可训练，派对焦点，热情四射。",
          personalityEn: "Impromptu comedian of the pier, noisy and agile, trainable, life of the party, passionate.",
          pattern: ["B","A","C","B","A","B","B","A","B","B","A","C"] },
        { key: "seal", nameZh: "海豹", nameEn: "Seal",
          personalityZh: "极地的实用工匠，水中敏捷，岸上笨拙，独居但技艺精湛。",
          personalityEn: "Practical artisan of the polar regions, agile in water, clumsy on land, solitary but skilled.",
          pattern: ["A","C","B","B","B","C","C","A","B","C","B","A"] },
        { key: "sea_otter", nameZh: "海獭", nameEn: "Sea Otter",
          personalityZh: "海藻林的浪漫梦想家，使用工具仰躺敲贝壳，母子情深，温柔创新。",
          personalityEn: "Romantic dreamer of kelp forests, uses tools to crack shells while floating on back, strong mother-pup bond, gentle and innovative.",
          pattern: ["C","A","C","A","A","A","B","A","B","B","B","B"] },
        { key: "polar_bear", nameZh: "北极熊", nameEn: "Polar Bear",
          personalityZh: "冰缘的机智辩论家，独居但善于创新捕猎策略，适应力强。",
          personalityEn: "Witty debater of the ice edge, solitary but adept at innovative hunting strategies, highly adaptable.",
          pattern: ["A","C","B","A","C","C","C","A","B","C","C","B"] }
    ];

    // ---------- 图片出处链接（基于image_source.docx）----------
    const IMAGE_CREDITS = {
        blue_whale: "https://en.wikipedia.org/wiki/Blue_whale",
        orca: "https://en.wikipedia.org/wiki/Orca",
        beluga: "https://zh.wikipedia.org/wiki/%E7%99%BD%E9%B2%B8",
        narwhal: "https://en.wikipedia.org/wiki/Narwhal",
        sperm_whale: "https://en.wikipedia.org/wiki/Sperm_whale",
        harbour_porpoise: "https://en.wikipedia.org/wiki/Harbour_porpoise",
        finless_porpoise: "https://en.wikipedia.org/wiki/Yangtze_finless_porpoise",
        bottlenose_dolphin: "https://en.wikipedia.org/wiki/Bottlenose_dolphin",
        chinese_white_dolphin: "https://www.fisheries.noaa.gov/species/taiwanese-humpback-dolphin",
        common_dolphin: "https://en.wikipedia.org/wiki/Common_dolphin",
        manatee: "https://en.wikipedia.org/wiki/Manatee",
        walrus: "https://zh.wikipedia.org/wiki/%E6%B5%B7%E8%B1%A1",
        sea_lion: "https://zh.wikipedia.org/wiki/%E6%B5%B7%E7%8D%85",
        seal: "https://en.wikipedia.org/wiki/Earless_seal",
        sea_otter: "https://en.wikipedia.org/wiki/Sea_otter",
        polar_bear: "https://zh.wikipedia.org/zh-cn/%E5%8C%97%E6%A5%B5%E7%86%8A"
    };

    // 全局变量
    let currentLang = 'zh';
    let currentPage = 'welcome'; // 'welcome', 'quiz', 'result'
    let currentIndex = 0;
    let answers = new Array(12).fill(null);
    let bestMatchAnimal = null;

    const mainDiv = document.getElementById('mainContent');
    const langToggle = document.getElementById('langToggle');
    const badgeSpan = document.getElementById('badgeText');
    const subTextSpan = document.getElementById('subText');

    function updateHeader() {
        badgeSpan.innerText = langData[currentLang].badge;
        subTextSpan.innerText = langData[currentLang].sub;
        langToggle.innerText = currentLang === 'zh' ? '🌐 English' : '🌐 中文';
    }

    function calculateMatch(userAnswers, pattern) {
        let score = 0;
        for (let i = 0; i < 12; i++) {
            if (userAnswers[i] === pattern[i]) score++;
        }
        return score;
    }

    function getBestMatch() {
        let best = null;
        let maxScore = -1;
        for (let animal of ANIMALS) {
            let score = calculateMatch(answers, animal.pattern);
            if (score > maxScore) {
                maxScore = score;
                best = animal;
            }
        }
        return best;
    }

    function renderWelcome() {
        const w = langData[currentLang].welcome;
        const html = `
            <div class="welcome-content">
                <h2>${w.title}</h2>
                <div class="welcome-text">${w.intro}</div>
                <button class="btn-start" id="startBtn">${w.startBtn}</button>
            </div>
            <footer>${langData[currentLang].footer}</footer>
        `;
        mainDiv.innerHTML = html;
        document.getElementById('startBtn')?.addEventListener('click', () => {
            currentPage = 'quiz';
            currentIndex = 0;
            answers = new Array(12).fill(null);
            renderQuiz();
        });
    }

    function renderQuiz() {
        const qData = QUESTIONS[currentLang][currentIndex];
        const progressPercent = ((currentIndex) / 12) * 100;
        const qLang = langData[currentLang].quiz;
        const nextBtnText = (currentIndex === 11) ? qLang.resultBtn : qLang.nextBtn;

        let optionsHtml = '';
        qData.options.forEach(opt => {
            optionsHtml += `
                <div class="option-btn" data-val="${opt.val}">
                    <span class="option-prefix">${opt.val}</span>
                    <span>${opt.label}</span>
                </div>
            `;
        });

        const html = `
            <div class="progress-area">
                <div class="progress-text">
                    <span>🐚 ${currentIndex+1} / 12</span>
                    <span>${Math.round(progressPercent)}%</span>
                </div>
                <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
            </div>
            <div class="question-box">
                <div class="question-text">${qData.text}</div>
                <div class="options-list" id="optionsList">
                    ${optionsHtml}
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" id="prevBtn" ${currentIndex === 0 ? 'disabled style="opacity:0.4"' : ''}>${qLang.prevBtn}</button>
                    <button class="btn btn-primary" id="nextBtn">${nextBtnText}</button>
                </div>
            </div>
            <footer>${langData[currentLang].footer}</footer>
        `;
        mainDiv.innerHTML = html;

        const optDivs = document.querySelectorAll('.option-btn');
        optDivs.forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.getAttribute('data-val');
                answers[currentIndex] = val;
                optDivs.forEach(b => b.style.background = "#f4fbfd");
                btn.style.background = "#c2e6ed";
                btn.style.borderColor = "#028c7c";
            });
        });
        if (answers[currentIndex]) {
            const selectedVal = answers[currentIndex];
            optDivs.forEach(btn => {
                if (btn.getAttribute('data-val') === selectedVal) {
                    btn.style.background = "#c2e6ed";
                    btn.style.borderColor = "#028c7c";
                }
            });
        }

        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuiz();
            }
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (!answers[currentIndex]) {
                alert(langData[currentLang].quiz.alertMsg);
                return;
            }
            if (currentIndex === 11) {
                const best = getBestMatch();
                bestMatchAnimal = best;
                currentPage = 'result';
                renderResult();
            } else {
                currentIndex++;
                renderQuiz();
            }
        });
    }

    function renderResult() {
        const animal = bestMatchAnimal;
        const rLang = langData[currentLang].result;
        const img1Path = `images1/${animal.key}.jpg`;
        const img2Path = `images2/${animal.key}.jpg`;
        const creditUrl = IMAGE_CREDITS[animal.key] || "#";
        const personality = (currentLang === 'zh') ? animal.personalityZh : animal.personalityEn;
        const animalName = (currentLang === 'zh') ? animal.nameZh : animal.nameEn;

        const html = `
            <div class="result-card">
                <div style="font-size: 2rem; text-align:center;">🐙✨ ${rLang.title} ✨🐙</div>
                <div class="animal-name">${animalName}</div>
                <div class="image-row">
                    <div class="image-container">
                        <img src="${img1Path}" alt="${animalName} - 1" class="result-img" onerror="this.src='https://placehold.co/200x200?text=Image+Not+Found'">
                    </div>
                    <div class="image-container">
                        <img src="${img2Path}" alt="${animalName} - 2" class="result-img" onerror="this.src='https://placehold.co/200x200?text=Image+Not+Found'">
                        <div class="img-credit">${rLang.creditPrefix} <a href="${creditUrl}" target="_blank">${creditUrl.replace(/^https?:\/\/(www\.)?/, '').split('/')[0]}</a></div>
                    </div>
                </div>
                <div class="animal-desc">
                    <div class="desc-title">${rLang.personalityTitle}</div>
                    <div class="personality-text">${personality}</div>
                </div>
                <button class="btn btn-primary restart-btn" id="restartBtn">${rLang.restart}</button>
            </div>
            <footer>${langData[currentLang].footer}</footer>
        `;
        mainDiv.innerHTML = html;
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            currentPage = 'welcome';
            renderWelcome();
        });
    }

    function refreshPage() {
        updateHeader();
        if (currentPage === 'welcome') {
            renderWelcome();
        } else if (currentPage === 'quiz') {
            renderQuiz();
        } else if (currentPage === 'result' && bestMatchAnimal) {
            renderResult();
        } else {
            // fallback
            currentPage = 'welcome';
            renderWelcome();
        }
    }

    langToggle.addEventListener('click', () => {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        refreshPage();
    });

    updateHeader();
    renderWelcome();
</script>
</body>
</html>
