<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MMTI · 海洋哺乳动物性格测试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #c8f0ff 0%, #9fd3e7 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            max-width: 850px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 40, 50, 0.2);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .hero {
            background: #025e6b;
            padding: 30px 25px 20px;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hero h1 span {
            background: #ffcf4a;
            color: #025e6b;
            font-size: 1.2rem;
            padding: 4px 12px;
            border-radius: 60px;
            font-weight: 600;
        }

        .hero .sub {
            font-size: 0.95rem;
            opacity: 0.9;
            margin-top: 8px;
            line-height: 1.4;
        }

        .quiz-body {
            padding: 30px 28px 40px;
        }

        .welcome-content {
            text-align: center;
        }
        .welcome-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #024e58;
            margin: 20px 0;
            text-align: left;
        }
        .btn-start {
            background: #028c7c;
            color: white;
            font-size: 1.2rem;
            padding: 14px 40px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn-start:hover {
            background: #016b5f;
            transform: scale(1.02);
        }

        .progress-area {
            margin-bottom: 30px;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #015c68;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .progress-bar-bg {
            background: #e0f0f3;
            border-radius: 40px;
            height: 12px;
            overflow: hidden;
        }
        .progress-fill {
            background: #028c7c;
            width: 0%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.3s ease;
        }

        .question-box {
            background: #ffffff;
            border-radius: 32px;
            padding: 20px 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #cde9ef;
            margin-bottom: 25px;
        }
        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: #024e58;
            line-height: 1.3;
            margin-bottom: 25px;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .option-btn {
            background: #f4fbfd;
            border: 1.5px solid #cbe1e6;
            border-radius: 100px;
            padding: 12px 22px;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            color: #024e58;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option-btn:hover {
            background: #e2f3f7;
            border-color: #028c7c;
            transform: translateX(6px);
        }
        .option-prefix {
            font-weight: 800;
            background: #cde9ef;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            color: #015c68;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 15px;
        }
        .btn {
            background: #e4f1f4;
            border: none;
            padding: 12px 25px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            color: #025e6b;
        }
        .btn-primary {
            background: #028c7c;
            color: white;
            box-shadow: 0 4px 8px rgba(2, 140, 124, 0.2);
        }
        .btn-primary:hover {
            background: #016b5f;
            transform: scale(0.98);
        }
        .btn-secondary:hover {
            background: #cde9ef;
        }

        .result-card {
            text-align: left;
        }
        .animal-name {
            font-size: 2rem;
            font-weight: 800;
            color: #d1452b;
            margin: 10px 0 5px;
            background: #fff1e5;
            display: inline-block;
            padding: 6px 28px;
            border-radius: 60px;
        }
        .image-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .image-container {
            text-align: center;
            max-width: 240px;
        }
        .result-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            display: block;
        }
        .img-credit {
            font-size: 0.7rem;
            color: #6f9ba5;
            margin-top: 8px;
            text-align: center;
        }
        .img-credit a {
            color: #028c7c;
            text-decoration: none;
            border-bottom: 1px dashed #028c7c;
        }
        .img-credit a:hover {
            color: #d1452b;
        }
        .animal-desc {
            background: #f8fef9;
            padding: 20px 25px;
            border-radius: 32px;
            margin: 15px 0;
            border-left: 6px solid #028c7c;
        }
        .desc-title {
            font-weight: 700;
            color: #025e6b;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        .personality-text {
            font-size: 1rem;
            line-height: 1.5;
            color: #1f5e66;
        }
        .restart-btn {
            background: #025e6b;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            padding: 20px 0 15px;
            color: #6f9ba5;
            border-top: 1px solid #d0e6ec;
            margin-top: 15px;
        }
        @media (max-width: 550px) {
            .result-img { width: 140px; height: 140px; }
            .image-container { max-width: 160px; }
        }
    </style>
</head>
<body>
<div class="card" id="app">
    <div class="hero">
        <h1>
            🐋 MMTI
            <span>海洋哺乳动物人格测试</span>
        </h1>
        <div class="sub">Marine Mammal Type Indicator</div>
    </div>
    <div class="quiz-body" id="mainContent"></div>
</div>

<script>
    // ---------- 首页欢迎文案（基于MMIT文案设置.docx）----------
    const welcomeText = `假如某天你彻底厌倦了陆地上的喧嚣与拥挤，转身跃入那片无垠的大海。当浪花将你温柔包裹，你将摇身一变，成为这深邃王国里的一位海洋居民。

那么你究竟会化身为何种神秘的海洋哺乳动物？是智慧优雅的精灵，还是神秘高冷的巨人？

十二道灵魂拷问，即刻揭晓你的海洋身份，领取专属你的海洋居民户口。`;

    // ---------- 12道题目（基于MMIT文案设置.docx）----------
    const QUESTIONS = [
        { text: "你喜欢与同类一起活动吗？", options: [
            { val: "A", label: "独来独往，最多有一两个相熟的玩伴。" },
            { val: "B", label: "多多益善，几十上百人的大团队才热闹。" },
            { val: "C", label: "稳定的小群体，与大家合作紧密。" }
        ]},
        { text: "你最可能待的地方是？", options: [
            { val: "A", label: "浅海或河口，自在地欣赏美丽的珊瑚礁。" },
            { val: "B", label: "开阔大洋，在深水区尽情遨游。" },
            { val: "C", label: "极地冰缘，挑战寒冷水域。" }
        ]},
        { text: "对于进食，你更倾向于哪种风格？", options: [
            { val: "A", label: "饭来张口。运动是不可能运动的，就这样张着嘴等待所有小鱼小虾流入........." },
            { val: "B", label: "主动出击、狩猎鱼群，有必要的时候参团围猎！" },
            { val: "C", label: "捡垃圾爱好者。只想在海底翻翻贝壳，捡捡螃蟹。" }
        ]},
        { text: "你大部分时候在海里的游泳速度是？", options: [
            { val: "A", label: "慢悠悠，节能最重要。" },
            { val: "B", label: "不快也不慢，偶尔会爆发冲刺。" },
            { val: "C", label: "快速且持久，喜欢冲浪玩水。" }
        ]},
        { text: "在海里遇到陌生事物（比如船或潜水员），你会？", options: [
            { val: "A", label: "好奇靠近，让我看看怎么个事儿！" },
            { val: "B", label: "好危险......保持距离，谨慎躲避。" },
            { val: "C", label: "无视，继续做自己的事。" }
        ]},
        { text: "你更认同哪种群体模式？", options: [
            { val: "A", label: "没有固定首领，大家平等合作，互相帮助。" },
            { val: "B", label: "等级森严，强者为尊。" },
            { val: "C", label: "平时松散，只有繁殖或迁徙时才临时聚集。" }
        ]},
        { text: "你会如何与同伴沟通？", options: [
            { val: "A", label: "复杂多变的语言，花式炫技。" },
            { val: "B", label: "简单的咔哒声或哨声，够用就行。" },
            { val: "C", label: "基本不沟通。" }
        ]},
        { text: "你比较适应的水深是？", options: [
            { val: "A", label: "水面附近，方便换气，也方便晒太阳。" },
            { val: "B", label: "几百米左右，偶尔下潜。" },
            { val: "C", label: "深渊，可以长时间潜水探索。" }
        ]},
        { text: "如果生活的环境产生了变化，比如食物减少，你会？", options: [
            { val: "A", label: "长途迁徙，去远方寻找更好的乐园。" },
            { val: "B", label: "改变食谱或捕食方式，灵活适应。" },
            { val: "C", label: "做动物最重要的就是忍耐！坚决留守，努力克服一切困难。" }
        ]},
        { text: "你更偏爱什么样的温度？", options: [
            { val: "A", label: "暖洋洋的很宜居。" },
            { val: "B", label: "不冷也不热，适中最舒服。" },
            { val: "C", label: "寒冷，让我清醒！" }
        ]},
        { text: "当遇到捕食者或者危险时，你的第一反应是？", options: [
            { val: "A", label: "队友救一下啊。呼唤同伴，共同警戒和防御。" },
            { val: "B", label: "逃跑虽可耻但有用。借助速度优势快速逃离。" },
            { val: "C", label: "我剑也未尝不利！利用体型或武器硬刚到底。" }
        ]},
        { text: "你的生活节奏更接近？", options: [
            { val: "A", label: "像个按部就班的NPC，每天活动路线差不多。" },
            { val: "B", label: "随性，想干嘛就干嘛，喜欢尝试新鲜事物。" },
            { val: "C", label: "忙碌且充实，既有固定任务又会刷新随机事件。" }
        ]}
    ];

    // ---------- 16种动物数据：key, 中文名, 性格描述(来自性格描述.docx), 匹配模式(来自MMIT文案设置.docx表格) ----------
    const ANIMALS = [
        { key: "blue_whale", name: "蓝鲸", pattern: ["A","B","A","C","C","C","C","C","A","B","C","A"],
          personality: "大洋的孤独战略家，全球迁徙，独行或成对，以低频歌声规划万里旅程。冷静、宏大、目标明确，是海洋中的建筑师。" },
        { key: "orca", name: "虎鲸", pattern: ["C","C","B","C","A","A","A","B","B","B","A","C"],
          personality: "全球海洋的顶级指挥官，母系社会，方言文化代代相传。团队围猎策略精密，天生领导者，果断高效。" },
        { key: "beluga", name: "白鲸", pattern: ["B","C","B","B","A","A","A","A","B","C","B","B"],
          personality: "北极的快乐社交家，结成大群，声音多变，表情丰富，好奇心强。乐于交友，热情活泼，海洋中的“竞选者”。" },
        { key: "narwhal", name: "一角鲸", pattern: ["A","C","B","B","B","C","B","B","A","C","B","A"],
          personality: "北极的神秘先知，长牙感知环境，群居但每个个体都带着神秘气质。富有远见而独特。" },
        { key: "sperm_whale", name: "抹香鲸", pattern: ["A","B","B","B","C","C","B","C","A","B","B","A"],
          personality: "深渊的逻辑学家，深潜2000米捕食大王乌贼，头部精密声呐。探索未知，理性哲人。" },
        { key: "harbour_porpoise", name: "港湾鼠海豚", pattern: ["A","A","B","B","B","C","B","A","C","B","B","A"],
          personality: "近岸的谨慎哨兵，害羞独居或小群，严守洄游路线，对干扰敏感。" },
        { key: "finless_porpoise", name: "江豚", pattern: ["A","A","B","A","B","C","C","A","C","A","B","A"],
          personality: "淡水的温柔守护者，常单独或成对，无背鳍，母护幼情深，低调默默奉献。" },
        { key: "bottlenose_dolphin", name: "宽吻海豚", pattern: ["C","A","B","B","A","A","A","B","B","B","A","C"],
          personality: "海湾的热心协调员，形成紧密群体，互助育儿，情商高，乐于帮助同伴。" },
        { key: "chinese_white_dolphin", name: "中华白海豚", pattern: ["C","A","B","B","A","A","A","A","C","A","A","C"],
          personality: "粉红河口的女神领袖，群体稳定，优雅有魅力，擅长引导族群。" },
        { key: "common_dolphin", name: "真海豚", pattern: ["B","B","B","C","A","C","B","B","A","A","B","B"],
          personality: "船首的冲浪冒险家，大群高速游动，喜欢乘浪，行动派，享受速度。" },
        { key: "manatee", name: "海牛", pattern: ["A","A","A","A","C","C","C","A","C","A","B","A"],
          personality: "热带浅海的素食诗人，行动缓慢，温顺无害，悠然自得，活在当下。" },
        { key: "walrus", name: "海象", pattern: ["B","C","C","A","B","B","C","A","B","C","C","A"],
          personality: "海滩的秩序执法官，等级分明，用长牙争夺地位，务实高效。" },
        { key: "sea_lion", name: "海狮", pattern: ["B","A","C","B","A","B","B","A","B","B","A","C"],
          personality: "码头的即兴喜剧演员，喧闹灵活，可训练，派对焦点，热情四射。" },
        { key: "seal", name: "海豹", pattern: ["A","C","B","B","B","C","C","A","B","C","B","A"],
          personality: "极地的实用工匠，水中敏捷，岸上笨拙，独居但技艺精湛。" },
        { key: "sea_otter", name: "海獭", pattern: ["C","A","C","A","A","A","B","A","B","B","B","B"],
          personality: "海藻林的浪漫梦想家，使用工具仰躺敲贝壳，母子情深，温柔创新。" },
        { key: "polar_bear", name: "北极熊", pattern: ["A","C","B","A","C","C","C","A","B","C","C","B"],
          personality: "冰缘的机智辩论家，独居但善于创新捕猎策略，适应力强。" }
    ];

    // ---------- 图片出处链接（基于image_source.docx）----------
    const IMAGE_CREDITS = {
        blue_whale: "https://en.wikipedia.org/wiki/Blue_whale",
        orca: "https://en.wikipedia.org/wiki/Orca",
        beluga: "https://zh.wikipedia.org/wiki/%E7%99%BD%E9%B2%B8",
        narwhal: "https://en.wikipedia.org/wiki/Narwhal",
        sperm_whale: "https://en.wikipedia.org/wiki/Sperm_whale",
        harbour_porpoise: "https://en.wikipedia.org/wiki/Harbour_porpoise",
        finless_porpoise: "https://en.wikipedia.org/wiki/Yangtze_finless_porpoise",
        bottlenose_dolphin: "https://en.wikipedia.org/wiki/Bottlenose_dolphin",
        chinese_white_dolphin: "https://www.fisheries.noaa.gov/species/taiwanese-humpback-dolphin",
        common_dolphin: "https://en.wikipedia.org/wiki/Common_dolphin",
        manatee: "https://en.wikipedia.org/wiki/Manatee",
        walrus: "https://zh.wikipedia.org/wiki/%E6%B5%B7%E8%B1%A1",
        sea_lion: "https://zh.wikipedia.org/wiki/%E6%B5%B7%E7%8D%85",
        seal: "https://en.wikipedia.org/wiki/Earless_seal",
        sea_otter: "https://en.wikipedia.org/wiki/Sea_otter",
        polar_bear: "https://zh.wikipedia.org/zh-cn/%E5%8C%97%E6%A5%B5%E7%86%8A"
    };

    // 全局变量
    let currentPage = 'welcome'; // 'welcome', 'quiz', 'result'
    let currentIndex = 0;
    let answers = new Array(12).fill(null);
    let bestMatchAnimal = null;

    const mainDiv = document.getElementById('mainContent');

    // 辅助函数
    function calculateMatch(userAnswers, pattern) {
        let score = 0;
        for (let i = 0; i < 12; i++) {
            if (userAnswers[i] === pattern[i]) score++;
        }
        return score;
    }

    function getBestMatch() {
        let best = null;
        let maxScore = -1;
        for (let animal of ANIMALS) {
            let score = calculateMatch(answers, animal.pattern);
            if (score > maxScore) {
                maxScore = score;
                best = animal;
            }
        }
        return best;
    }

    // 渲染欢迎页
    function renderWelcome() {
        const html = `
            <div class="welcome-content">
                <h2>🐚 欢迎参加 MMTI 测试</h2>
                <div class="welcome-text">
                    ${welcomeText.replace(/\n/g, '<br>')}
                </div>
                <button class="btn-start" id="startBtn">🌊 开始测试</button>
            </div>
            <footer>🐋 MMTI · 基于真实海洋哺乳动物习性设计</footer>
        `;
        mainDiv.innerHTML = html;
        document.getElementById('startBtn')?.addEventListener('click', () => {
            currentPage = 'quiz';
            currentIndex = 0;
            answers = new Array(12).fill(null);
            renderQuiz();
        });
    }

    // 渲染题目页
    function renderQuiz() {
        const q = QUESTIONS[currentIndex];
        const progressPercent = ((currentIndex) / 12) * 100;
        let optionsHtml = '';
        q.options.forEach(opt => {
            optionsHtml += `
                <div class="option-btn" data-val="${opt.val}">
                    <span class="option-prefix">${opt.val}</span>
                    <span>${opt.label}</span>
                </div>
            `;
        });
        const nextBtnText = (currentIndex === 11) ? "🐟 查看结果" : "下一题 →";
        const html = `
            <div class="progress-area">
                <div class="progress-text">
                    <span>🐚 第 ${currentIndex+1} / 12 题</span>
                    <span>${Math.round(progressPercent)}%</span>
                </div>
                <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
            </div>
            <div class="question-box">
                <div class="question-text">${q.text}</div>
                <div class="options-list" id="optionsList">
                    ${optionsHtml}
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" id="prevBtn" ${currentIndex === 0 ? 'disabled style="opacity:0.4"' : ''}>← 上一题</button>
                    <button class="btn btn-primary" id="nextBtn">${nextBtnText}</button>
                </div>
            </div>
            <footer>🐋 MMTI · 基于真实海洋哺乳动物习性设计</footer>
        `;
        mainDiv.innerHTML = html;

        const optDivs = document.querySelectorAll('.option-btn');
        optDivs.forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.getAttribute('data-val');
                answers[currentIndex] = val;
                optDivs.forEach(b => b.style.background = "#f4fbfd");
                btn.style.background = "#c2e6ed";
                btn.style.borderColor = "#028c7c";
            });
        });
        if (answers[currentIndex]) {
            const selectedVal = answers[currentIndex];
            optDivs.forEach(btn => {
                if (btn.getAttribute('data-val') === selectedVal) {
                    btn.style.background = "#c2e6ed";
                    btn.style.borderColor = "#028c7c";
                }
            });
        }

        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuiz();
            }
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (!answers[currentIndex]) {
                alert("请先选择一个答案再继续～");
                return;
            }
            if (currentIndex === 11) {
                const best = getBestMatch();
                bestMatchAnimal = best;
                currentPage = 'result';
                renderResult();
            } else {
                currentIndex++;
                renderQuiz();
            }
        });
    }

    // 渲染结果页
    function renderResult() {
        const animal = bestMatchAnimal;
        const img1Path = `images1/${animal.key}.jpg`;
        const img2Path = `images2/${animal.key}.jpg`;
        const creditUrl = IMAGE_CREDITS[animal.key] || "#";
        const html = `
            <div class="result-card">
                <div style="font-size: 2rem; text-align:center;">🐙✨ 你的海洋身份 ✨🐙</div>
                <div class="animal-name">${animal.name}</div>
                <div class="image-row">
                    <div class="image-container">
                        <img src="${img1Path}" alt="${animal.name} - 图1" class="result-img" onerror="this.src='https://placehold.co/200x200?text=Image+Not+Found'">
                    </div>
                    <div class="image-container">
                        <img src="${img2Path}" alt="${animal.name} - 图2" class="result-img" onerror="this.src='https://placehold.co/200x200?text=Image+Not+Found'">
                        <div class="img-credit">📷 图片来源：<a href="${creditUrl}" target="_blank">${creditUrl.replace(/^https?:\/\/(www\.)?/, '').split('/')[0]}</a></div>
                    </div>
                </div>
                <div class="animal-desc">
                    <div class="desc-title">🧬 性格描述</div>
                    <div class="personality-text">${animal.personality}</div>
                </div>
                <button class="btn btn-primary restart-btn" id="restartBtn">🔄 重新测试</button>
            </div>
            <footer>🐋 MMTI · 基于真实海洋哺乳动物习性设计</footer>
        `;
        mainDiv.innerHTML = html;
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            currentPage = 'welcome';
            renderWelcome();
        });
    }

    // 启动
    renderWelcome();
</script>
</body>
</html>
